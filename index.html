<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KodaSamples | Cloud Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: sans-serif; -webkit-tap-highlight-color: transparent; }
        .header-gradient { background: linear-gradient(90deg, #581c87, #9333ea, #c026d3); }
        .card-main { background: #0a0a0a; border-radius: 24px; overflow: hidden; border: 1px solid #1a1a1a; margin-bottom: 20px; }
        #uploadModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; backdrop-filter: blur(12px); align-items: center; justify-content: center; padding: 20px; }
        .control-panel { background: #000; width: 100%; max-width: 450px; border-radius: 32px; border: 1px dashed #333; padding: 24px; position: relative; }
        .panel-input { background: #111; border: 1px solid #222; border-radius: 16px; padding: 16px; width: 100%; color: white; margin-bottom: 12px; outline: none; }
        .btn-anexar { background: #9333ea; width: 58px; height: 58px; border-radius: 18px; display: flex; align-items: center; justify-content: center; }
        .btn-subir { background: #22c55e; width: 58px; height: 58px; border-radius: 18px; display: flex; align-items: center; justify-content: center; }
        .pack-image { background: linear-gradient(180deg, #6b21a8, #000); height: 180px; display: flex; align-items: center; justify-content: center; font-size: 3rem; font-weight: 900; }
        .page { display: none; }
        .page-active { display: block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="min-h-screen pb-32">

    <header class="header-gradient py-6 text-center sticky top-0 z-50">
        <h1 class="text-2xl font-black italic uppercase">KODASAMPLES</h1>
    </header>

    <main id="homePage" class="page page-active px-6 pt-6">
        <input id="searchInput" type="text" class="w-full bg-zinc-900 border border-zinc-800 rounded-2xl py-4 px-6 mb-8" placeholder="Procurar pack...">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-xl font-bold italic">Biblioteca</h2>
            <span id="packCounter" class="text-zinc-500 text-sm">0 Itens</span>
        </div>
        <div id="packsGrid"></div>
    </main>

    <div id="uploadModal">
        <div class="control-panel text-center">
            <button onclick="toggleModal(false)" class="absolute -top-10 right-0 text-white text-2xl">&times;</button>
            <h3 class="text-zinc-500 text-[10px] font-black tracking-widest uppercase mb-6">Cloud Control</h3>
            <input type="text" id="kitName" class="panel-input" placeholder="Nome do Pack">
            <input type="text" id="kitLink" class="panel-input" placeholder="Link (Mega/Drive)">
            <div class="flex justify-between items-center mt-6">
                <input type="file" id="fileInput" class="hidden">
                <label for="fileInput" class="btn-anexar"><i class="fas fa-paperclip"></i></label>
                <div id="statusLabel" class="text-xs italic text-zinc-500">Pronto</div>
                <button onclick="uploadToRender()" class="btn-subir"><i id="subirIcon" class="fas fa-cloud-upload-alt"></i></button>
            </div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-black border-t border-zinc-900 py-6 px-12 flex justify-between z-50">
        <i onclick="switchPage('home')" class="fas fa-home text-2xl text-purple-500 cursor-pointer"></i>
        <i onclick="toggleModal(true)" class="fas fa-plus-circle text-2xl text-zinc-600 cursor-pointer"></i>
    </nav>

    <script>
        // Carrega os packs do LocalStorage
        let packs = JSON.parse(localStorage.getItem('kodaPacks')) || [];

        function render() {
            const grid = document.getElementById('packsGrid');
            grid.innerHTML = '';
            packs.forEach(p => {
                grid.innerHTML += `
                    <div class="card-main">
                        <div class="pack-image">KODA</div>
                        <div class="p-6 flex justify-between items-center">
                            <div class="truncate pr-4">
                                <h3 class="font-bold text-white truncate">${p.title}</h3>
                                <p class="text-purple-500 text-[10px] font-black uppercase">${p.type}</p>
                            </div>
                            <a href="${p.link}" target="_blank" class="w-12 h-12 bg-zinc-900 rounded-xl flex items-center justify-center text-purple-500">
                                <i class="fas fa-download"></i>
                            </a>
                        </div>
                    </div>`;
            });
            document.getElementById('packCounter').innerText = `${packs.length} Itens`;
        }

        async function uploadToRender() {
            const name = document.getElementById('kitName').value;
            const link = document.getElementById('kitLink').value;
            const file = document.getElementById('fileInput').files[0];
            const status = document.getElementById('statusLabel');
            const icon = document.getElementById('subirIcon');

            if(!name && !link && !file) return alert("Preencha algo!");

            const formData = new FormData();
            formData.append('description', name || "Sem Nome");
            formData.append('link', link || "");
            if(file) formData.append('file', file);

            status.innerText = "A subir...";
            icon.className = "fas fa-circle-notch loading-spin";

            try {
                const res = await fetch('/upload', { method: 'POST', body: formData });
                if(res.ok) {
                    // ADICIONA O CARD LOCALMENTE
                    const novo = { id: Date.now(), title: name || "Novo", link: link || "#", type: file ? "FILE" : "LINK" };
                    packs.unshift(novo);
                    localStorage.setItem('kodaPacks', JSON.stringify(packs));
                    render();
                    status.innerText = "✅ OK!";
                    setTimeout(() => toggleModal(false), 1000);
                }
            } catch(e) { status.innerText = "❌ Erro"; }
            finally { icon.className = "fas fa-cloud-upload-alt"; }
        }

        function toggleModal(s) { document.getElementById('uploadModal').style.display = s ? 'flex' : 'none'; }
        function switchPage(p) { render(); }
        window.onload = render;
    </script>
</body>
</html>
