<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KodaSamples | A Casa dos Produtores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffffff;
            --bg-pure-black: #000000;
            --zinc-950: #09090b;
        }

        body {
            background: var(--bg-pure-black);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden; 
        }

        /* --- TELA DE ENTRADA --- */
        #splashScreen {
            position: fixed;
            inset: 0;
            background: var(--bg-pure-black);
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 1s cubic-bezier(0.8, 0, 0.2, 1);
            overflow: hidden;
        }

        #splashScreen.hide {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }

        .video-background-container {
            position: absolute;
            top: 38%;
            left: 50%;
            transform: translate(-50%, -50%); 
            width: 150vw; 
            max-width: 1200px; 
            aspect-ratio: 1/1;
            z-index: 1; 
            pointer-events: none;
        }

        .mascot-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .overlay-content {
            position: relative;
            z-index: 10; 
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            text-align: center;
            margin-top: 180px; 
        }

        .artist-input {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 16px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            font-weight: 700;
            color: white;
            outline: none;
            transition: all 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 13px;
            margin-top: 15px;
        }

        .enter-btn {
            width: 100%;
            max-width: 320px;
            background: white;
            color: black;
            padding: 18px;
            border-radius: 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            margin-top: 12px;
        }

        /* --- ESTRUTURA DE PÁGINAS --- */
        .page-container {
            position: fixed;
            inset: 0;
            padding-bottom: 120px;
            overflow-y: auto;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .page-container.active {
            display: flex;
            flex-direction: column;
            opacity: 1;
        }

                /* AJUSTE FINAL PARA NÃO FICAR ATRÁS DO BANNER */
                .categories-container {
            display: flex !important;
            overflow-x: auto !important;
            overflow-y: hidden !important;
            gap: 12px;
            padding: 0 32px !important;
            
            /* Ajuste de margem para parar de sumir */
            margin-top: 12px !important; 
            margin-bottom: 15px !important;
            
            /* Altura ideal para os botões aparecerem inteiros */
            height: 55px !important;
            
            align-items: center;
            z-index: 100 !important;
            position: relative;
            
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            touch-action: pan-x;
        }
 


        .categories-container::-webkit-scrollbar { display: none; }

        .filter-btn {
            flex-shrink: 0;
            padding: 10px 20px;
            border-radius: 50px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            white-space: nowrap;
            transition: all 0.3s;
            color: rgba(255,255,255,0.4);
            letter-spacing: 1px;
        }
        .filter-btn.active {
            background: white;
            color: black;
            border-color: white;
        }

        /* CARDS COLORIDOS */
        .kit-card {
            background: linear-gradient(145deg, #121212 0%, #050505 100%);
            border-radius: 32px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeIn 0.5s ease backwards;
            position: relative;
            overflow: hidden;
        }

        .kit-thumb {
            width: 100%;
            aspect-ratio: 1/1;
            background: #111;
            border-radius: 24px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .kit-thumb img { width: 100%; height: 100%; object-fit: cover; }

        .download-badge {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: white;
            color: black;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* --- SISTEMA DE DESTAQUE --- */
        .highlights-scroll {
            display: flex;
            overflow-x: auto;
            gap: 16px;
            scroll-snap-type: x mandatory;
            padding: 10px 32px 10px; /* Reduzido padding inferior */
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .highlights-scroll::-webkit-scrollbar { display: none; }
        
        .highlight-card {
            min-width: 100%;
            scroll-snap-align: center;
            position: relative;
            height: 180px;
            border-radius: 35px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
            background: #0a0a0a;
        }

        /* --- PAINEL DE UPLOAD (MODAL) --- */
        #uploadModal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: flex-end;
        }

        #uploadModal.active { display: flex; }

        .panel-content {
            background: #0a0a0a;
            width: 100%;
            max-width: 500px;
            border-radius: 40px 40px 0 0;
            padding: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
            animation: panelSlideUp 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        @keyframes panelSlideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .panel-input, .panel-select {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 15px;
            color: white;
            font-size: 13px;
            margin-bottom: 15px;
            outline: none;
        }

        .panel-select { appearance: none; }

        .upload-btn-box {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .select-btn {
            flex: 1;
            background: rgba(255,255,255,0.03);
            border: 1px dashed rgba(255,255,255,0.2);
            border-radius: 18px;
            padding: 20px;
            text-align: center;
            font-size: 10px;
            font-weight: 800;
            color: rgba(255,255,255,0.6);
            cursor: pointer;
        }

        .preview-img {
            width: 50px;
            height: 50px;
            border-radius: 8px;
            object-fit: cover;
            margin: 0 auto 5px;
            display: none;
        }

        /* Navegação */
        .nav-container {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 12px 24px;
            width: 90%;
            max-width: 400px;
        }

        .nav-btn.active { color: white !important; }
        .nav-btn { color: rgba(255,255,255,0.2); transition: all 0.3s; }

        #uploadStatus {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: black;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 900;
            z-index: 3000;
            display: none;
        }

        #copyToast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #22c55e;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 11px;
            z-index: 4000;
            display: none;
        }

        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

    <div id="uploadStatus">A UPAR TUDO... <span id="progVal">0%</span></div>
    <div id="copyToast">LINK COPIADO COM SUCESSO!</div>

    <div id="splashScreen">
        <div class="overlay-content">
            <div class="text-center mb-2">
                <h2 class="text-4xl font-black italic tracking-tighter" style="font-family: 'Syncopate';">KODASAMPLES</h2>
                <p class="text-[10px] text-white/50 font-bold tracking-[0.4em] mt-3 uppercase px-10">A CASA DOS PRODUTORES</p>
            </div>
            <div class="w-full flex flex-col items-center px-6">
                <input type="text" id="artistNameInput" class="artist-input" placeholder="TEU NOME DE ARTISTA">
                <button onclick="enterApp()" class="enter-btn">Iniciar Estúdio</button>
            </div>
        </div>
        <div class="video-background-container">
            <video id="mascotVideo" class="mascot-video" autoplay loop muted playsinline>
                <source src="https://www.dropbox.com/scl/fi/aoyn4sg77baz8kw2as0ry/lv_0_20260507165613.mp4?rlkey=t0vjqnw3u6t7oprvbcyv6vg1o&st=sxv6qzc6&raw=1" type="video/mp4">
            </video>
        </div>
    </div>

    <main id="homePage" class="page-container active">
        <header class="p-8 pb-4 flex justify-between items-end">
            <div>
                <p class="text-[11px] font-black text-white/40 tracking-[0.4em] uppercase mb-1">BEM-VINDO AO</p>
                <h2 class="text-xl font-black italic uppercase" style="font-family: 'Syncopate';">KODASAMPLES</h2>
            </div>
            <div class="w-12 h-12 rounded-full border border-white/10 flex items-center justify-center bg-zinc-950">
                <i class="fas fa-bolt text-white/60"></i>
            </div>
        </header>

        <section class="mt-2 mb-0">
            <div id="highlightsContainer" class="highlights-scroll"></div>
        </section>

        <section class="categories-container no-scrollbar">
            <button onclick="filterCategory('all')" class="filter-btn active" data-cat="all">Todos</button>
            <button onclick="filterCategory('samples')" class="filter-btn" data-cat="samples">Samples</button>
            <button onclick="filterCategory('melodias')" class="filter-btn" data-cat="melodias">Melodias</button>
            <button onclick="filterCategory('drumkit')" class="filter-btn" data-cat="drumkit">Drumkits</button>
            <button onclick="filterCategory('acapella')" class="filter-btn" data-cat="acapella">Acapellas</button>
        </section>

        <section class="px-8 pt-6 pb-10"> 
    <div id="kitsGrid" class="grid grid-cols-2 gap-4"></div>
</section>
    </main>

    <main id="profilePage" class="page-container">
        <section class="profile-hero text-center pt-10">
            <div class="relative w-32 h-32 mx-auto mb-6">
                <div class="w-full h-full rounded-full bg-zinc-900 border-4 border-white/5 flex items-center justify-center overflow-hidden">
                    <i class="fas fa-user text-4xl text-white/10"></i>
                </div>
                <div class="absolute bottom-1 right-1 w-10 h-10 bg-white text-black rounded-full flex items-center justify-center border-4 border-black">
                    <i class="fas fa-check text-sm"></i>
                </div>
            </div>
            <h2 id="displayArtistName" class="text-2xl font-black uppercase italic tracking-tighter" style="font-family: 'Syncopate';">PRODUTOR</h2>
            <p class="text-[10px] text-white/30 font-bold tracking-[0.3em] mt-2">VERIFIED KODA ARTIST</p>
        </section>

        <section class="px-8 space-y-4 mt-10">
            <div class="bg-zinc-900/30 rounded-[32px] border border-white/5 p-6 flex items-center gap-4 active:scale-95 transition-transform" onclick="window.open('https://instagram.com/kodasamples', '_blank')">
                <div class="w-12 h-12 rounded-2xl bg-gradient-to-tr from-yellow-500 via-pink-500 to-purple-600 flex items-center justify-center">
                    <i class="fab fa-instagram text-2xl text-white"></i>
                </div>
                <div>
                    <h4 class="text-[11px] font-black uppercase tracking-wider">Instagram Oficial</h4>
                    <p class="text-[10px] text-white/50 font-bold tracking-widest">@kodasamples</p>
                </div>
                <i class="fas fa-external-link-alt ml-auto text-white/20 text-xs"></i>
            </div>

            <div class="bg-zinc-900/30 rounded-[32px] border border-white/5 p-6 flex items-center gap-4 active:scale-95 transition-transform cursor-pointer" onclick="shareSite()">
                <div class="w-12 h-12 rounded-2xl bg-white/5 flex items-center justify-center">
                    <i class="fas fa-share-nodes text-xl text-blue-500"></i>
                </div>
                <div>
                    <h4 class="text-[11px] font-black uppercase tracking-wider text-blue-400">Compartilhar Site</h4>
                    <p class="text-[9px] text-white/30 font-bold uppercase">Espalha a palavra</p>
                </div>
                <i class="fas fa-copy ml-auto text-white/20 text-xs"></i>
            </div>

            <button onclick="location.reload()" class="w-full bg-red-500/10 text-red-500 py-5 rounded-[24px] font-black text-[10px] uppercase tracking-[0.2em] border border-red-500/20 active:scale-95 transition-all mt-8">
                Sair do Estúdio
            </button>
        </section>
    </main>

    <div id="uploadModal" onclick="this.classList.remove('active')">
        <div class="panel-content" onclick="event.stopPropagation()">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-lg font-black italic" style="font-family: 'Syncopate';">UPAR PACK</h3>
                <button onclick="document.getElementById('uploadModal').classList.remove('active')" class="text-white/30"><i class="fas fa-times text-xl"></i></button>
            </div>
            <input type="text" id="upName" class="panel-input" placeholder="NOME DO PACK">
            
            <select id="upCategory" class="panel-select">
                <option value="samples" selected>SAMPLES (DRUMS/FX)</option>
                <option value="melodias">MELODIAS/LOOPS</option>
                <option value="drumkit">DRUMKIT</option>
                <option value="acapella">ACAPELLA</option>
            </select>

            <input type="text" id="upDesc" class="panel-input" placeholder="DESCRIÇÃO (EX: PREMIUM PACK)">
            <input type="text" id="upLink" class="panel-input" placeholder="LINK DE DOWNLOAD">
            
            <div class="upload-btn-box">
                <div class="select-btn" onclick="document.getElementById('imgInput').click()">
                    <img id="pImg" class="preview-img">
                    <i class="fas fa-camera" id="camIcon"></i> CAPA
                    <input type="file" id="imgInput" class="hidden" accept="image/*">
                </div>
            </div>
            <button onclick="startUpload()" class="w-full bg-white text-black py-5 rounded-2xl font-black text-xs uppercase tracking-widest active:scale-95 transition-transform">
                Publicar no Site
            </button>
        </div>
    </div>

    <nav class="fixed bottom-8 left-0 right-0 flex justify-center px-6 z-50">
        <div class="nav-container flex items-center justify-between">
            <button onclick="switchPage('home')" id="navHome" class="nav-btn active w-12 h-12 flex items-center justify-center text-xl"><i class="fas fa-home"></i></button>
            <button onclick="document.getElementById('uploadModal').classList.add('active')" class="w-14 h-14 bg-white text-black rounded-full flex items-center justify-center text-xl shadow-2xl active:scale-90 transition-transform">
                <i class="fas fa-plus"></i>
            </button>
            <button onclick="switchPage('profile')" id="navProfile" class="nav-btn w-12 h-12 flex items-center justify-center text-xl"><i class="fas fa-user"></i></button>
        </div>
    </nav>

    <script>
        async function fetchPacks() {
            try {
                const res = await fetch('/packs?t=' + Date.now());
                const packs = await res.json();
                const grid = document.getElementById('kitsGrid');
                const highlightContainer = document.getElementById('highlightsContainer');
                
                grid.innerHTML = ''; 
                highlightContainer.innerHTML = '';

                packs.slice(0, 5).forEach(p => addHighlight(p.title, p.link, p.image));
                packs.forEach(p => addCardToSite(p.title, p.description, p.link, p.image, p.category));
            } catch (e) { console.log("Erro ao carregar"); }
        }

        function filterCategory(cat) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-cat') === cat);
            });

            const cards = document.querySelectorAll('.kit-card');
            cards.forEach(card => {
                if (cat === 'all') {
                    card.style.display = 'block';
                } else {
                    card.style.display = (card.getAttribute('data-category') === cat) ? 'block' : 'none';
                }
            });
        }

        function addHighlight(name, link, img) {
            const container = document.getElementById('highlightsContainer');
            const card = document.createElement('div');
            card.className = 'highlight-card';
            card.onclick = () => window.open(link, '_blank');
            const bg = img ? `url(${img})` : 'linear-gradient(to br, #1a1a1a, #000)';
            
            card.innerHTML = `
                <div style="background: ${bg}; background-size: cover; background-position: center; width: 100%; height: 100%; opacity: 0.5; position: absolute; inset: 0;"></div>
                <div class="relative z-10 p-8 h-full flex flex-col justify-center">
                    <div class="flex items-center gap-2 mb-2">
                        <span class="text-[8px] font-black bg-white text-black px-2 py-1 rounded tracking-widest uppercase">DESTAQUE</span>
                        <span class="text-[8px] font-black border border-white/20 text-white/60 px-2 py-1 rounded tracking-widest uppercase">NEW RELEASE</span>
                    </div>
                    <h3 class="text-2xl font-black italic uppercase text-white drop-shadow-2xl" style="font-family: 'Syncopate'; letter-spacing: -1px;">${name}</h3>
                </div>
            `;
            container.appendChild(card);
        }

        function shareSite() {
            const siteUrl = window.location.href;
            const message = "🔥 Visite o nosso site de packs e samples exclusivos! " + siteUrl;
            navigator.clipboard.writeText(message).then(() => {
                const toast = document.getElementById('copyToast');
                toast.style.display = 'block';
                setTimeout(() => { toast.style.display = 'none'; }, 2000);
            });
        }

        function enterApp() {
            const name = document.getElementById('artistNameInput').value;
            if(name) document.getElementById('displayArtistName').innerText = name;
            document.getElementById('splashScreen').classList.add('hide');
            document.body.style.overflow = 'auto';
            fetchPacks();
        }

        function switchPage(page) {
            document.getElementById('homePage').classList.toggle('active', page === 'home');
            document.getElementById('profilePage').classList.toggle('active', page === 'profile');
            document.getElementById('navHome').classList.toggle('active', page === 'home');
            document.getElementById('navProfile').classList.toggle('active', page === 'profile');
            window.scrollTo(0,0);
        }

        document.getElementById('imgInput').addEventListener('change', function(e) {
            const file = e.target.files[0];
            if(file) {
                const reader = new FileReader();
                reader.onload = (ev) => {
                    document.getElementById('pImg').src = ev.target.result;
                    document.getElementById('pImg').style.display = 'block';
                    document.getElementById('camIcon').style.display = 'none';
                };
                reader.readAsDataURL(file);
            }
        });

        async function startUpload() {
            const name = document.getElementById('upName').value;
            const link = document.getElementById('upLink').value;
            const category = document.getElementById('upCategory').value;

            if(!name || !link) return alert("Preencha os campos!");

            const status = document.getElementById('uploadStatus');
            status.style.display = 'block';
            document.getElementById('uploadModal').classList.remove('active');

            const fd = new FormData();
            fd.append('description', name);
            fd.append('shortDesc', document.getElementById('upDesc').value || 'PREMIUM PACK');
            fd.append('link', link);
            fd.append('category', category);

            if(document.getElementById('imgInput').files[0]) fd.append('photo', document.getElementById('imgInput').files[0]);

            try {
                const res = await fetch('/upload', { method: 'POST', body: fd });
                if(res.ok) {
                    document.getElementById('progVal').innerText = "100%";
                    setTimeout(() => {
                        status.style.display = 'none';
                        fetchPacks();
                        limparCampos();
                    }, 1000);
                }
            } catch (e) { alert("Erro ao subir"); status.style.display = 'none'; }
        }

        function limparCampos() {
            document.getElementById('upName').value = "";
            document.getElementById('upDesc').value = "";
            document.getElementById('upLink').value = "";
            document.getElementById('pImg').style.display = 'none';
            document.getElementById('camIcon').style.display = 'block';
        }

        function addCardToSite(name, desc, link, img, cat) {
            const grid = document.getElementById('kitsGrid');
            const card = document.createElement('div');
            card.className = 'kit-card';
            card.setAttribute('data-category', cat || 'samples');
            const thumb = img ? `<img src="${img}">` : `<i class="fas fa-compact-disc text-white/10 text-4xl"></i>`;
            card.innerHTML = `
                <div class="kit-thumb" onclick="window.open('${link}', '_blank')">
                    ${thumb}
                    <div class="download-badge"><i class="fas fa-arrow-down text-[12px]"></i></div>
                </div>
                <h5 class="text-[10px] font-black tracking-wider uppercase truncate">${name}</h5>
                <p class="text-[9px] text-blue-500 font-bold uppercase mt-1">${cat || 'SAMPLES'}</p>
            `;
            grid.prepend(card);
        }
        window.onload = () => { document.getElementById('mascotVideo').play().catch(()=>{}); };
    </script>
</body>
</html>
