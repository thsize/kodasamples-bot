<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KodaSamples | A Casa dos Produtores</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Syncopate:wght@700&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #ffffff;
            --bg-pure-black: #000000;
            --zinc-950: #09090b;
        }

        body {
            background: var(--bg-pure-black);
            color: white;
            font-family: 'Inter', sans-serif;
            margin: 0;
            overflow: hidden; 
        }

        /* --- TELA DE ENTRADA --- */
        #splashScreen {
            position: fixed;
            inset: 0;
            background: var(--bg-pure-black);
            z-index: 999;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: all 1s cubic-bezier(0.8, 0, 0.2, 1);
            overflow: hidden;
        }

        #splashScreen.hide {
            transform: translateY(-100%);
            opacity: 0;
            pointer-events: none;
        }

        .video-background-container {
            position: absolute;
            top: 38%;
            left: 50%;
            transform: translate(-50%, -50%); 
            width: 150vw; 
            max-width: 1200px; 
            aspect-ratio: 1/1;
            z-index: 1; 
            pointer-events: none;
        }

        .mascot-video {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .overlay-content {
            position: relative;
            z-index: 10; 
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            text-align: center;
            margin-top: 180px; 
        }

        .artist-input {
            background: rgba(255,255,255,0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255,255,255,0.1);
            border-radius: 20px;
            padding: 16px;
            width: 100%;
            max-width: 320px;
            text-align: center;
            font-weight: 700;
            color: white;
            outline: none;
            transition: all 0.4s;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-size: 13px;
            margin-top: 15px;
        }

        .enter-btn {
            width: 100%;
            max-width: 320px;
            background: white;
            color: black;
            padding: 18px;
            border-radius: 20px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 11px;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            margin-top: 12px;
        }

        /* --- ESTRUTURA DE PÁGINAS --- */
        .page-container {
            position: fixed;
            inset: 0;
            padding-bottom: 120px;
            overflow-y: auto;
            display: none;
            opacity: 0;
            transition: opacity 0.5s ease;
        }

        .page-container.active {
            display: flex;
            flex-direction: column;
            opacity: 1;
        }

        /* CATEGORIAS DESIGN - CORRIGIDO PARA MOBILE */
        .categories-container {
            display: flex !important;
            overflow-x: auto !important;
            gap: 12px;
            padding: 15px 32px;
            margin-bottom: 10px;
            -webkit-overflow-scrolling: touch;
            scrollbar-width: none;
            z-index: 50;
            position: relative;
        }

        .categories-container::-webkit-scrollbar { display: none; }

        .filter-btn {
            flex-shrink: 0;
            padding: 10px 22px;
            border-radius: 50px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.08);
            font-size: 10px;
            font-weight: 800;
            text-transform: uppercase;
            white-space: nowrap;
            transition: all 0.3s;
            color: rgba(255,255,255,0.4);
            letter-spacing: 1px;
        }
        .filter-btn.active {
            background: white;
            color: black;
            border-color: white;
        }

        /* CARDS COLORIDOS */
        .kit-card {
            background: linear-gradient(145deg, #121212 0%, #050505 100%);
            border-radius: 32px;
            padding: 16px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            animation: fadeIn 0.5s ease backwards;
            position: relative;
            overflow: hidden;
        }

        .kit-thumb {
            width: 100%;
            aspect-ratio: 1/1;
            background: #111;
            border-radius: 24px;
            margin-bottom: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            position: relative;
            border: 1px solid rgba(255,255,255,0.03);
        }

        .kit-thumb img { width: 100%; height: 100%; object-fit: cover; }

        .download-badge {
            position: absolute;
            bottom: 10px;
            right: 10px;
            background: white;
            color: black;
            width: 32px;
            height: 32px;
            border-radius: 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }

        /* --- SISTEMA DE DESTAQUE --- */
        .highlights-scroll {
            display: flex;
            overflow-x: auto;
            gap: 16px;
            scroll-snap-type: x mandatory;
            padding: 10px 32px 25px;
            -ms-overflow-style: none;
            scrollbar-width: none;
        }
        .highlights-scroll::-webkit-scrollbar { display: none; }
        
        .highlight-card {
            min-width: 100%;
            scroll-snap-align: center;
            position: relative;
            height: 180px;
            border-radius: 35px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            flex-shrink: 0;
            background: #0a0a0a;
        }

        /* --- PAINEL DE UPLOAD --- */
        #uploadModal {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            backdrop-filter: blur(20px);
            z-index: 2000;
            display: none;
            justify-content: center;
            align-items: flex-end;
        }

        #uploadModal.active { display: flex; }

        .panel-content {
            background: #0a0a0a;
            width: 100%;
            max-width: 500px;
            border-radius: 40px 40px 0 0;
            padding: 30px;
            border-top: 1px solid rgba(255,255,255,0.1);
            animation: panelSlideUp 0.4s cubic-bezier(0.2, 1, 0.3, 1);
        }

        @keyframes panelSlideUp {
            from { transform: translateY(100%); }
            to { transform: translateY(0); }
        }

        .panel-input, .panel-select {
            width: 100%;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 18px;
            padding: 15px;
            color: white;
            font-size: 13px;
            margin-bottom: 15px;
            outline: none;
        }

        .panel-select { appearance: none; }

        /* Navegação */
        .nav-container {
            background: rgba(10, 10, 10, 0.85);
            backdrop-filter: blur(30px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 40px;
            padding: 12px 24px;
            width: 90%;
            max-width: 400px;
        }

        .nav-btn.active { color: white !important; }
        .nav-btn { color: rgba(255,255,255,0.2); transition: all 0.3s; }

        #uploadStatus {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: white;
            color: black;
            padding: 12px 24px;
            border-radius: 50px;
            font-size: 10px;
            font-weight: 900;
            z-index: 3000;
            display: none;
        }

        #copyToast {
            position: fixed;
            top: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #22c55e;
            color: white;
            padding: 12px 24px;
            border-radius: 12px;
            font-weight: 800;
            font-size: 11px;
            z-index: 4000;
            display: none;
        }

        ::-webkit-scrollbar { width: 0px; }
    </style>
</head>
<body>

    <div id="uploadStatus">A UPAR TUDO... <span id="progVal">0%</span></div>
    <div id="copyToast">LINK COPIADO COM SUCESSO!</div>

    <div id="splashScreen">
        <div class="overlay-content">
            <div class="text-center mb-2">
                <h2 class="text-4xl font-black italic tracking-tighter" style="font-family: 'Syncopate';">KODASAMPLES</h2>
                <p class="text-[10px] text-white/50 font-bold tracking-[0.4em] mt-3 uppercase px-10">A CASA DOS PRODUTORES</p>
            </div>
            <div class="w-full flex flex-col items-center px-6">
                <input type="text" id="artistNameInput" class="artist-input" placeholder="TEU NOME DE ARTISTA">
                <button onclick="enterApp()" class="enter-btn">Iniciar Estúdio</button>
            </div>
        </div>
        <div class="video-background-container">
            <video id="mascotVideo" class="mascot-video" autoplay loop muted playsinline>
                <source src="https://www.dropbox.com/scl/fi/aoyn4sg77baz8kw2as0ry/lv_0_20260507165613.mp4?rlkey=t0vjqnw3u6t7oprvbcyv6vg1o&st=sxv6qzc6&raw=1" type="video/mp4">
            </video>
        </div>
    </div>

    <main id="homePage" class="page-container active">
        <header class="p-8 pb-4 flex justify-between items-end">
            <div>
                <p class="text-[11px] font-black text-white/40 tracking-[0.4em] uppercase mb-1">BEM-VINDO AO</p>
                <h2 class="text-xl font-black italic uppercase" style="font-family: 'Syncopate';">KODASAMPLES</h2>
            </div>
            <div class="w-12 h-12 rounded-full border border-white/10 flex items-center justify-center bg-zinc-950">
                <i class="fas fa-bolt text-white/60"></i>
            </div>
        </header>

        <section class="mt-2 mb-2">
            <div id="highlightsContainer" class="highlights-scroll"></div>
        </section>

        <section class="categories-container no-scrollbar">
            <button onclick="filterCategory('all')" class="filter-btn active" data-cat="all">Todos</button>
            <button onclick="filterCategory('samples')" class="filter-btn" data-cat="samples">Samples</button>
            <button onclick="filterCategory('melodias')" class="filter-btn" data-cat="melodias">Melodias</button>
            <button onclick="filterCategory('drumkit')" class="filter-btn" data-cat="drumkit">Drumkits</button>
            <button onclick="filterCategory('acapella')" class="filter-btn" data-cat="acapella">Acapellas</button>
        </section>

        <section class="px-8 pb-10">
            <div id="kitsGrid" class="grid grid-cols-2 gap-4"></div>
        </section>

        <footer class="mt-auto py-10 text-center border-t border-white/5">
            <div class="flex flex-col items-center gap-2">
                <p class="text-[9px] font-black text-white/20 tracking-[0.4em] uppercase">Powered by</p>
                <div class="flex items-center gap-4 opacity-40 grayscale">
                    <span class="text-[10px] font-black italic" style="font-family: 'Syncopate';">NANO</span>
                    <div class="w-1 h-1 rounded-full bg-white/20"></div>
                    <span class="text-[10px] font-black italic" style="font-family: 'Syncopate';">EVIRA</span>
                </div>
                <p class="text-[8px] text-white/10 font-bold mt-4 tracking-widest uppercase">
                    © 2026 KodaSamples | THSIZE & Dichava Produtora
                </p>
            </div>
        </footer>
    </main>

    <main id="profilePage" class="page-container">
        </main>

    <nav class="fixed bottom-8 left-0 right-0 flex justify-center px-6 z-50">
        </nav>

    <script>
        // Funções fetchPacks, filterCategory, addHighlight, enterApp, etc.
        // Mantive a lógica original, apenas certifique-se de que filterCategory usa 'data-category' nos cards.
        async function fetchPacks() {
            try {
                const res = await fetch('/packs?t=' + Date.now());
                const packs = await res.json();
                const grid = document.getElementById('kitsGrid');
                const highlightContainer = document.getElementById('highlightsContainer');
                grid.innerHTML = ''; highlightContainer.innerHTML = '';
                packs.slice(0, 5).forEach(p => addHighlight(p.title, p.link, p.image));
                packs.forEach(p => addCardToSite(p.title, p.description, p.link, p.image, p.category));
            } catch (e) { console.log("Erro ao carregar"); }
        }

        function filterCategory(cat) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.classList.toggle('active', btn.getAttribute('data-cat') === cat);
            });
            const cards = document.querySelectorAll('.kit-card');
            cards.forEach(card => {
                if (cat === 'all') { card.style.display = 'block'; }
                else { card.style.display = (card.getAttribute('data-category') === cat) ? 'block' : 'none'; }
            });
        }

        function addCardToSite(name, desc, link, img, cat) {
            const grid = document.getElementById('kitsGrid');
            const card = document.createElement('div');
            card.className = 'kit-card';
            card.setAttribute('data-category', cat || 'samples');
            const thumb = img ? `<img src="${img}">` : `<i class="fas fa-compact-disc text-white/10 text-4xl"></i>`;
            card.innerHTML = `
                <div class="kit-thumb" onclick="window.open('${link}', '_blank')">
                    ${thumb}
                    <div class="download-badge"><i class="fas fa-arrow-down text-[12px]"></i></div>
                </div>
                <h5 class="text-[10px] font-black tracking-wider uppercase truncate">${name}</h5>
                <p class="text-[9px] text-blue-500 font-bold uppercase mt-1">${cat || 'SAMPLES'}</p>
            `;
            grid.prepend(card);
        }
        // ... (resto dos scripts)
    </script>
</body>
</html>
