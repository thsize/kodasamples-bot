<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KodaSamples | Cloud Storage</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <style>
        body { background: #000; color: white; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; -webkit-tap-highlight-color: transparent; }
        .header-gradient { background: linear-gradient(90deg, #581c87, #9333ea, #c026d3); }
        .card-main { background: #0a0a0a; border-radius: 24px; overflow: hidden; border: 1px solid #1a1a1a; transition: transform 0.2s; }
        .card-main:active { transform: scale(0.98); }
        #uploadModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); z-index: 100; backdrop-filter: blur(12px); align-items: center; justify-content: center; padding: 20px; }
        .control-panel { background: #000; width: 100%; max-width: 450px; border-radius: 32px; border: 1px dashed #333; padding: 24px; position: relative; max-height: 90vh; overflow-y: auto; }
        .panel-input { background: #111; border: 1px solid #222; border-radius: 16px; padding: 16px; width: 100%; color: white; margin-bottom: 12px; outline: none; font-size: 14px; }
        .btn-action { width: 58px; height: 58px; border-radius: 18px; display: flex; align-items: center; justify-content: center; transition: all 0.2s; }
        .btn-anexar { background: #9333ea; box-shadow: 0 4px 15px rgba(147, 51, 234, 0.3); }
        .btn-foto { background: #3b82f6; box-shadow: 0 4px 15px rgba(59, 130, 246, 0.3); }
        .btn-subir { background: #22c55e; box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3); }
        .pack-image { height: 220px; width: 100%; object-fit: cover; background: linear-gradient(180deg, #6b21a8, #000); display: flex; align-items: center; justify-content: center; font-size: 4.5rem; font-weight: 900; }
        .page { display: none; }
        .page-active { display: block; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .loading-spin { animation: spin 1s linear infinite; }
    </style>
</head>
<body class="min-h-screen pb-32">

    <header class="header-gradient py-6 text-center shadow-xl sticky top-0 z-50">
        <h1 class="text-3xl font-black tracking-widest italic uppercase">KODASAMPLES</h1>
    </header>

    <main id="homePage" class="page page-active">
        <div class="px-6 pt-8">
            <div class="relative">
                <input id="searchInput" type="text" class="w-full bg-zinc-900 border border-zinc-800 rounded-2xl py-4 pl-12 text-lg focus:outline-none focus:border-purple-600 transition-all" placeholder="Procurar pack...">
                <i class="fas fa-search absolute left-5 top-5 text-zinc-500"></i>
            </div>
        </div>
        <div class="px-6 pt-10">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold italic">Biblioteca</h2>
                <span id="packCounter" class="text-zinc-500 text-sm font-medium">0 Itens</span>
            </div>
            <div id="packsGrid" class="space-y-8">
                </div>
        </div>
    </main>

    <main id="profilePage" class="page px-6 pt-10 text-center">
        <div class="profile-avatar mb-4 w-[110px] h-[110px] rounded-[35px] bg-gradient-to-br from-purple-900 to-fuchsia-600 flex items-center justify-center text-5xl font-black mx-auto border-4 border-zinc-900 shadow-2xl">K</div>
        <h2 class="text-3xl font-black italic uppercase">KODA USER</h2>
        <p class="text-purple-500 font-bold text-xs tracking-widest mt-1 uppercase">Produtor & Admin</p>
        
        <div class="mt-10 space-y-4 text-left">
            <div class="card-main p-6 flex items-center justify-between border-zinc-900 hover:border-purple-600 cursor-pointer">
                <div class="flex items-center gap-4">
                    <div class="w-12 h-12 bg-zinc-900 rounded-xl flex items-center justify-center"><i class="fab fa-instagram text-2xl text-pink-500"></i></div>
                    <div><span class="font-bold text-base block">Instagram Oficial</span><span class="text-[10px] text-zinc-500 uppercase tracking-tighter">Segue o nosso trabalho</span></div>
                </div>
                <i class="fas fa-chevron-right text-zinc-700 text-xs"></i>
            </div>
        </div>
        <p class="mt-16 text-[10px] font-bold text-zinc-500 uppercase tracking-[0.2em] opacity-50">Feito por <span class="text-white">THSIZE</span></p>
    </main>

    <div id="uploadModal">
        <div class="control-panel text-center">
            <button onclick="toggleModal(false)" class="absolute -top-12 right-0 text-white opacity-50 p-2"><i class="fas fa-times text-2xl"></i></button>
            <h3 class="text-zinc-500 text-[10px] font-black tracking-[0.3em] uppercase mb-6">Painel de Lançamento</h3>
            
            <input type="text" id="kitName" class="panel-input" placeholder="Título do Pack">
            <input type="text" id="kitDesc" class="panel-input" placeholder="Descrição curta (ex: Funk, Trap, 808)">
            <input type="text" id="kitLink" class="panel-input" placeholder="Link de Download (Drive/Mega)">
            
            <div id="imgPreview" class="hidden mb-4 w-full h-32 rounded-2xl overflow-hidden border border-zinc-800">
                <img id="previewTag" src="" class="w-full h-full object-cover">
            </div>

            <div class="flex justify-around items-center mt-6">
                <div class="flex flex-col items-center gap-2">
                    <input type="file" id="fileInput" class="hidden">
                    <label for="fileInput" class="btn-action btn-anexar cursor-pointer active:scale-90"><i class="fas fa-file-archive text-white text-xl"></i></label>
                    <span class="text-[9px] text-zinc-500 font-bold uppercase">Pack</span>
                </div>

                <div class="flex flex-col items-center gap-2">
                    <input type="file" id="photoInput" accept="image/*" class="hidden" onchange="previewImage(this)">
                    <label for="photoInput" class="btn-action btn-foto cursor-pointer active:scale-90"><i class="fas fa-camera text-white text-xl"></i></label>
                    <span class="text-[9px] text-zinc-500 font-bold uppercase">Capa</span>
                </div>

                <div class="flex flex-col items-center gap-2">
                    <button onclick="uploadToRender()" class="btn-action btn-subir active:scale-90"><i id="subirIcon" class="fas fa-cloud-upload-alt text-white text-xl"></i></button>
                    <span class="text-[9px] text-zinc-500 font-bold uppercase">Subir</span>
                </div>
            </div>
            <div id="statusLabel" class="mt-4 text-[11px] italic text-zinc-500">Pronto para subir</div>
        </div>
    </div>

    <nav class="fixed bottom-0 left-0 right-0 bg-black/90 backdrop-blur-lg border-t border-zinc-900 py-5 px-12 flex justify-between items-center z-50">
        <div onclick="switchPage('home')" id="navHome" class="flex flex-col items-center text-purple-500 cursor-pointer transition-all"><i class="fas fa-home text-2xl"></i></div>
        <div onclick="toggleModal(true)" class="flex flex-col items-center text-zinc-600 cursor-pointer transition-all"><i class="fas fa-plus-circle text-2xl"></i></div>
        <div onclick="switchPage('profile')" id="navProfile" class="flex flex-col items-center text-zinc-600 cursor-pointer transition-all"><i class="fas fa-user-circle text-2xl"></i></div>
    </nav>

    <script>
        let packs = [];

        // BUSCA PACKS DO SERVIDOR (Para todos verem)
        async function fetchPacks() {
            try {
                const response = await fetch('/packs');
                if (response.ok) {
                    packs = await response.json();
                    render();
                }
            } catch (err) {
                console.error("Erro ao carregar do servidor");
            }
        }

        // PREVIEW DA FOTO SELECIONADA
        function previewImage(input) {
            const preview = document.getElementById('imgPreview');
            const tag = document.getElementById('previewTag');
            if (input.files && input.files[0]) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    tag.src = e.target.result;
                    preview.classList.remove('hidden');
                };
                reader.readAsDataURL(input.files[0]);
            }
        }

        // UPLOAD PARA O RENDER
        async function uploadToRender() {
            const name = document.getElementById('kitName').value;
            const desc = document.getElementById('kitDesc').value;
            const link = document.getElementById('kitLink').value;
            const fileInput = document.getElementById('fileInput');
            const photoInput = document.getElementById('photoInput');
            const status = document.getElementById('statusLabel');
            const icon = document.getElementById('subirIcon');

            if (!name) return alert("Dê um nome ao seu pack!");

            const formData = new FormData();
            formData.append('description', name);
            formData.append('shortDesc', desc);
            formData.append('link', link);
            if (fileInput.files[0]) formData.append('file', fileInput.files[0]);
            if (photoInput.files[0]) formData.append('photo', photoInput.files[0]);

            status.innerText = "Publicando para todos...";
            icon.className = "fas fa-circle-notch loading-spin text-white text-xl";

            try {
                const response = await fetch('/upload', { method: 'POST', body: formData });
                if (response.ok) {
                    status.innerText = "✅ PUBLICADO COM SUCESSO!";
                    await fetchPacks(); // Atualiza a lista na hora
                    setTimeout(() => {
                        toggleModal(false);
                        document.querySelectorAll('.panel-input').forEach(i => i.value = "");
                        document.getElementById('imgPreview').classList.add('hidden');
                        status.innerText = "Pronto para subir";
                    }, 1500);
                } else {
                    status.innerText = "❌ Erro no upload";
                }
            } catch (err) {
                status.innerText = "❌ Falha de conexão";
            } finally {
                icon.className = "fas fa-cloud-upload-alt text-white text-xl";
            }
        }

        function render() {
            const grid = document.getElementById('packsGrid');
            grid.innerHTML = packs.map(p => `
                <div class="card-main">
                    ${p.image ? `<img src="${p.image}" class="pack-image">` : `<div class="pack-image">KODA</div>`}
                    <div class="p-6 flex justify-between items-center bg-zinc-950">
                        <div class="truncate pr-4">
                            <h3 class="text-xl font-bold text-white truncate">${p.title}</h3>
                            <p class="text-zinc-500 text-xs mb-2 truncate">${p.description || 'Premium Collection'}</p>
                            <p class="text-purple-500 text-[9px] font-black tracking-widest uppercase">${p.type}</p>
                        </div>
                        <a href="${p.link}" target="_blank" class="w-12 h-12 bg-zinc-900 border border-zinc-800 rounded-2xl flex items-center justify-center text-purple-500 shadow-lg active:scale-90 transition">
                            <i class="fas fa-download"></i>
                        </a>
                    </div>
                </div>
            `).join('');
            document.getElementById('packCounter').innerText = `${packs.length} Itens`;
        }

        function switchPage(pageId) {
            document.querySelectorAll('.page').forEach(p => p.classList.remove('page-active'));
            document.getElementById(`${pageId}Page`).classList.add('page-active');
            const navHome = document.getElementById('navHome');
            const navProfile = document.getElementById('navProfile');
            if(pageId === 'home') {
                navHome.className = 'flex flex-col items-center text-purple-500 cursor-pointer transition-all';
                navProfile.className = 'flex flex-col items-center text-zinc-600 cursor-pointer transition-all';
            } else {
                navProfile.className = 'flex flex-col items-center text-purple-500 cursor-pointer transition-all';
                navHome.className = 'flex flex-col items-center text-zinc-600 cursor-pointer transition-all';
            }
        }

        function toggleModal(show) { document.getElementById('uploadModal').style.display = show ? 'flex' : 'none'; }

        // Pesquisa em tempo real
        document.getElementById('searchInput').addEventListener('input', (e) => {
            const termo = e.target.value.toLowerCase();
            document.querySelectorAll('.card-main').forEach(card => {
                const txt = card.querySelector('h3').innerText.toLowerCase();
                card.style.display = txt.includes(termo) ? 'block' : 'none';
            });
        });

        // Carrega os dados assim que o site abre
        window.onload = fetchPacks;
    </script>
</body>
</html>
